<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#04050A" />
    <title>Pixxel Customer Passport</title>

      /* The app is a dark single-theme "space canvas". Without this the browser

      html { color-scheme: dark; }
      #root { min-height: 100vh; background: #04050A; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
